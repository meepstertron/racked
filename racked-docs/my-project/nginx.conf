server {
    listen 80;
    server_name racked.dino.icu racked.hexagonical.xyz;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static assets directly (no fallback)
    location /docs/assets/ {
        try_files $uri =404;
    }

    # Docs SPA routing
    location /docs/ {
        try_files $uri $uri/ /docs/index.html;
    }

    # Root app SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}